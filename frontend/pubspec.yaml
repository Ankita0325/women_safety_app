name: women_safety_app
description: Women Safety Application with AI and Emergency Features
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  
  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  location: ^5.0.3
  
  # Voice & AI
  speech_to_text: ^6.3.0
  record: ^5.0.0  # Replaces audio_recorder
  
  # HTTP
  http: ^1.1.0
  connectivity_plus: ^5.0.1
  
  # State Management
  provider: ^6.0.5
  
  # UI
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  cupertino_icons: ^1.0.6
  
  # Permissions
  permission_handler: ^11.0.1
  url_launcher: ^6.2.1
  shared_preferences: ^2.2.2
  
  # SMS & Telephony
  telephony: ^0.2.0
  
  # Utilities
  intl: ^0.18.1
  image_picker: ^1.0.5
  path_provider: ^2.1.0
  flutter_secure_storage: ^9.0.0
  
  # Additional
  vibration: ^1.7.6
  flutter_phone_direct_caller: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/sounds/
    - assets/animations/